name: Release

# Triggered by pushing a version tag like v1.0.7. One job creates a single
# GitHub Release first (avoids the parallel-job duplicate-release race), then
# three native jobs build + upload their installers to it. electron-builder
# publishes to the existing release; it goes live automatically — no manual
# "publish draft" step.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Create ONE release up front so the three build jobs don't race to create
  # duplicates. draft:false + prerelease:false means it's live immediately.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: npx electron-builder --mac dmg --publish always
          - os: windows-latest
            build: npx electron-builder --win nsis --publish always
          - os: ubuntu-latest
            build: npx electron-builder --linux AppImage --publish always
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: "true"
        run: npm ci

      - name: Build front-end + bundle binaries + server
        run: npm run build:electron

      - name: Build & publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.build }}
