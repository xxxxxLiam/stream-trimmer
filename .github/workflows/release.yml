name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: npx electron-builder --mac dmg --publish always
          - os: windows-latest
            build: npx electron-builder --win nsis --publish always
          - os: ubuntu-latest
            build: npx electron-builder --linux AppImage --publish always
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: "true"
        run: npm ci
      - name: Build front-end + bundle binaries + server
        run: npm run build:electron
      - name: Build & publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.build }}
